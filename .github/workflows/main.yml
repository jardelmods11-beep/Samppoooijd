name: SAMP iOS - Patch Estatico

on:
  workflow_dispatch:
    inputs:
      gtasa_ipa_url:
        description: "URL do GTA SA IPA"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: pip3 install lief --break-system-packages

      - name: Baixar GTA SA IPA
        run: |
          mkdir -p ipa_input
          curl -L "${{ github.event.inputs.gtasa_ipa_url }}" -o ipa_input/gtasa_original.ipa
          echo "Tamanho: $(du -sh ipa_input/gtasa_original.ipa | cut -f1)"

      - name: Extrair binário do IPA
        run: |
          python3 scripts/unpack_ipa.py \
            --ipa ipa_input/gtasa_original.ipa \
            --output extracted/
          BINARY=$(python3 scripts/unpack_ipa.py \
            --ipa ipa_input/gtasa_original.ipa \
            --output extracted/ 2>/dev/null | grep "BINARY_PATH=" | cut -d= -f2)
          echo "GTASA_BINARY=$BINARY" >> $GITHUB_ENV

      - name: Aplicar patch estático
        run: |
          python3 scripts/patch_binary.py \
            --binary "${{ env.GTASA_BINARY }}" \
            --output extracted/gta3sa_patched
          ls -lh extracted/gta3sa_patched

      - name: Reempacotar IPA
        run: |
          python3 scripts/repack_ipa.py \
            --ipa ipa_input/gtasa_original.ipa \
            --binary extracted/gta3sa_patched \
            --output gtasa_samp_patched.ipa
          ls -lh gtasa_samp_patched.ipa

      - name: Upload IPA patchado
        uses: actions/upload-artifact@v4
        with:
          name: gtasa-samp-patched
          path: gtasa_samp_patched.ipa
          retention-days: 7
