name: SAMP iOS Build

on:
  workflow_dispatch:
    inputs:
      gtasa_ipa_url:
        description: "URL do GTA SA IPA"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang gcc-aarch64-linux-gnu g++-aarch64-linux-gnu python3-pip zip unzip file
          pip3 install lief --break-system-packages

      - name: Criar stub mach-o/dyld.h
        run: |
          mkdir -p stubs/mach-o
          printf '#pragma once\n#include <stdint.h>\n#ifdef __cplusplus\nextern "C" {\n#endif\nuint32_t _dyld_image_count(void);\nconst char* _dyld_get_image_name(uint32_t);\nconst void* _dyld_get_image_header(uint32_t);\n#ifdef __cplusplus\n}\n#endif\n' > stubs/mach-o/dyld.h
          echo "Stub criado:"
          cat stubs/mach-o/dyld.h

      - name: Baixar GTA SA IPA
        run: |
          mkdir -p ipa_input
          curl -L "${{ github.event.inputs.gtasa_ipa_url }}" -o ipa_input/gtasa_original.ipa
          echo "Tamanho: $(du -sh ipa_input/gtasa_original.ipa | cut -f1)"

      - name: Extrair binário GTASA do IPA
        run: |
          python3 scripts/unpack_ipa.py \
            --ipa ipa_input/gtasa_original.ipa \
            --output extracted/
          BINARY=$(python3 scripts/unpack_ipa.py \
            --ipa ipa_input/gtasa_original.ipa \
            --output extracted/ 2>/dev/null | grep "BINARY_PATH=" | cut -d= -f2)
          echo "GTASA_BINARY=$BINARY" >> $GITHUB_ENV
          echo "Binario: $BINARY"

      - name: Extrair offsets do GTASA iOS
        run: |
          python3 scripts/extract_offsets.py \
            --binary "${{ env.GTASA_BINARY }}" \
            --output src/ios_offsets.h \
            --json offsets_report.json
          cat src/ios_offsets.h

      - name: Compilar libSAMP.dylib (ARM64)
        run: |
          mkdir -p build
          SYSROOT=/usr/aarch64-linux-gnu

          CFLAGS="-target aarch64-linux-gnu --sysroot=$SYSROOT -I$SYSROOT/include -O2 -fvisibility=hidden -fPIC -std=c++17 -DIOS_PORT -DHOST_ENDIAN_IS_LITTLE -DLITTLE_ENDIAN -DRAKSAMP_CLIENT -DNETCODE_OPENCONNLULZ=6969 -frtti -fexceptions -w -I src/ -I sa_include/ -I raknet/ -I raknet/SAMP/ -I ttmath/ -I stubs/"
          LDFLAGS="-shared -target aarch64-linux-gnu --sysroot=$SYSROOT -fPIC"

          OBJECTS=""
          PIDS=()

          for cpp in src/*.cpp; do
            obj="build/$(basename ${cpp%.cpp}).o"
            clang++ $CFLAGS -c "$cpp" -o "$obj" &
            PIDS+=($!)
            OBJECTS="$OBJECTS $obj"
          done

          for cpp in raknet/*.cpp raknet/SAMP/*.cpp; do
            [ -f "$cpp" ] || continue
            obj="build/raknet_$(basename ${cpp%.cpp}).o"
            clang++ $CFLAGS -c "$cpp" -o "$obj" &
            PIDS+=($!)
            OBJECTS="$OBJECTS $obj"
          done

          FAIL=0
          for pid in "${PIDS[@]}"; do
            wait $pid || FAIL=1
          done
          [ $FAIL -eq 0 ] || { echo "ERRO na compilacao"; exit 1; }

          echo "[LD] Linkando..."
          clang++ $LDFLAGS $OBJECTS -o build/libSAMP.dylib
          file build/libSAMP.dylib
          ls -lh build/libSAMP.dylib

      - name: Injetar libSAMP.dylib no IPA
        run: |
          python3 scripts/inject_dylib.py \
            --ipa ipa_input/gtasa_original.ipa \
            --dylib build/libSAMP.dylib \
            --output gtasa_samp.ipa
          ls -lh gtasa_samp.ipa

      - name: Upload IPA com SAMP
        uses: actions/upload-artifact@v4
        with:
          name: gtasa-samp-ios
          path: gtasa_samp.ipa
          retention-days: 7

      - name: Upload dylib e offsets
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/libSAMP.dylib
            offsets_report.json
            src/ios_offsets.h
          retention-days: 30
