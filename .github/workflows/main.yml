name: SAMP iOS - Compilar dylib

on:
  workflow_dispatch:
    inputs:
      gta3sa_url:
        description: "URL do arquivo gta3sa (para extrair offsets)"
        required: true
        type: string

jobs:
  # ── Job 1: Ubuntu (barato) — extrai offsets ──────────────────────────────────
  offsets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        run: pip3 install lief --break-system-packages

      - name: Baixar gta3sa
        run: |
          mkdir -p extracted
          curl -L "${{ github.event.inputs.gta3sa_url }}" -o extracted/gta3sa
          echo "Tamanho: $(du -sh extracted/gta3sa | cut -f1)"

      - name: Extrair offsets
        run: |
          python3 scripts/extract_offsets.py \
            --binary extracted/gta3sa \
            --output src/ios_offsets.h \
            --json offsets_report.json
          cat src/ios_offsets.h

      - name: Salvar offsets
        uses: actions/upload-artifact@v4
        with:
          name: offsets
          path: |
            src/ios_offsets.h
            offsets_report.json
          retention-days: 1

  # ── Job 2: macOS — compila a dylib ───────────────────────────────────────────
  build:
    runs-on: macos-latest
    needs: offsets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar offsets
        uses: actions/download-artifact@v4
        with:
          name: offsets

      - name: Mover ios_offsets.h
        run: |
          mv ios_offsets.h src/ios_offsets.h 2>/dev/null || true
          ls src/ios_offsets.h && echo "offsets OK"

      - name: Compilar libSAMP.dylib (ARM64 iOS)
        run: |
          mkdir -p build
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CLANG=$(xcrun --find clang++)

          CFLAGS="-target arm64-apple-ios12.0 -isysroot $SDK -O2 -fvisibility=hidden -fPIC -std=c++17 -DIOS_PORT -DHOST_ENDIAN_IS_LITTLE -DLITTLE_ENDIAN -DRAKSAMP_CLIENT -DNETCODE_OPENCONNLULZ=6969 -frtti -fexceptions -w -I src/ -I sa_include/ -I raknet/ -I raknet/SAMP/ -I ttmath/"
          LDFLAGS="-dynamiclib -target arm64-apple-ios12.0 -isysroot $SDK -install_name @executable_path/Frameworks/libSAMP.dylib -lc++ -framework Foundation"

          OBJECTS=""
          PIDS=()
          for cpp in src/*.cpp raknet/*.cpp raknet/SAMP/*.cpp; do
            [ -f "$cpp" ] || continue
            obj="build/$(echo $cpp | tr '/' '_').o"
            $CLANG $CFLAGS -c "$cpp" -o "$obj" &
            PIDS+=($!)
            OBJECTS="$OBJECTS $obj"
          done

          FAIL=0
          for pid in "${PIDS[@]}"; do wait $pid || FAIL=1; done
          [ $FAIL -eq 0 ] || { echo "ERRO na compilacao"; exit 1; }

          echo "[LD] Linkando..."
          $CLANG $LDFLAGS $OBJECTS -o build/libSAMP.dylib
          file build/libSAMP.dylib
          ls -lh build/libSAMP.dylib

      - name: Upload libSAMP.dylib
        uses: actions/upload-artifact@v4
        with:
          name: libSAMP-dylib
          path: build/libSAMP.dylib
          retention-days: 30

      - name: Upload offsets
        uses: actions/upload-artifact@v4
        with:
          name: offsets-report
          path: |
            offsets_report.json
            src/ios_offsets.h
          retention-days: 30
