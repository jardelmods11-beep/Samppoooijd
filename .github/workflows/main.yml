name: SAMP iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      gtasa_ipa_url:
        description: "URL direta para baixar o GTA SA IPA"
        required: true
        type: string

jobs:
  build:
    # ubuntu-latest = GRATUITO (macos cobra 10x mais e bloqueou sua conta)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm lld cmake git \
            libxml2-dev libssl-dev zlib1g-dev python3-pip curl unzip file
          pip3 install lief

      - name: Baixar iPhoneOS SDK (theos/sdks - publico e gratuito)
        run: |
          mkdir -p $HOME/iossdk
          curl -L \
            "https://github.com/theos/sdks/releases/download/2024-02-29/iPhoneOS16.2.sdk.tar.xz" \
            -o /tmp/iPhoneOS.sdk.tar.xz
          tar -xf /tmp/iPhoneOS.sdk.tar.xz -C $HOME/iossdk
          echo "IPHONE_SDK=$HOME/iossdk/iPhoneOS16.2.sdk" >> $GITHUB_ENV
          ls $HOME/iossdk/

      - name: Baixar GTA SA IPA
        run: |
          mkdir -p ipa_input
          curl -L "${{ github.event.inputs.gtasa_ipa_url }}" \
            -o ipa_input/gtasa_original.ipa
          TIPO=$(file ipa_input/gtasa_original.ipa)
          echo "Tipo: $TIPO"
          if ! echo "$TIPO" | grep -qiE "zip|archive"; then
            echo "ERRO: nao e um IPA valido!"
            head -c 500 ipa_input/gtasa_original.ipa
            exit 1
          fi

      - name: Extrair binario GTASA do IPA
        run: |
          python3 scripts/unpack_ipa.py \
            --ipa ipa_input/gtasa_original.ipa \
            --output extracted/
          BINARY=$(find extracted -name "GrandTheftAutoSanAndreas" -o -name "GTASA" | head -1)
          echo "GTASA_BINARY=$BINARY" >> $GITHUB_ENV
          echo "Binario: $BINARY"
          file "$BINARY"

      - name: Extrair offsets do GTASA iOS
        run: |
          python3 scripts/extract_offsets.py \
            --binary "${{ env.GTASA_BINARY }}" \
            --output src/ios_offsets.h \
            --json offsets_report.json \
            --android libs/android/libGTASA.so
          cat src/ios_offsets.h

      - name: Compilar libSAMP.dylib (ARM64 iOS)
        run: |
          mkdir -p build
          CLANG="clang++"
          SDK="${{ env.IPHONE_SDK }}"
          CFLAGS=(
            -target arm64-apple-ios12.0 -isysroot "$SDK"
            -O2 -fvisibility=hidden -fno-objc-arc -std=c++17
            -DIOS_PORT -DHOST_ENDIAN_IS_LITTLE -DLITTLE_ENDIAN
            -DRAKSAMP_CLIENT -DNETCODE_OPENCONNLULZ=6969
            -frtti -fexceptions -w
            -I src/ -I sa_include/ -I raknet/ -I ttmath/
          )
          LDFLAGS=(
            -dynamiclib -target arm64-apple-ios12.0 -isysroot "$SDK"
            -install_name @executable_path/Frameworks/libSAMP.dylib -lc++
          )
          OBJECTS=()
          for cpp in src/*.cpp; do
            obj="build/$(basename ${cpp%.cpp}).o"
            echo "[CC] $cpp"
            "$CLANG" "${CFLAGS[@]}" -c "$cpp" -o "$obj"
            OBJECTS+=("$obj")
          done
          for cpp in raknet/*.cpp raknet/SAMP/*.cpp; do
            obj="build/raknet_$(basename ${cpp%.cpp}).o"
            echo "[CC] $cpp"
            "$CLANG" "${CFLAGS[@]}" -c "$cpp" -o "$obj"
            OBJECTS+=("$obj")
          done
          echo "[LD] Linkando..."
          "$CLANG" "${LDFLAGS[@]}" "${OBJECTS[@]}" -o build/libSAMP.dylib
          file build/libSAMP.dylib
          ls -lh build/libSAMP.dylib

      - name: Injetar libSAMP.dylib no IPA
        run: |
          python3 scripts/inject_dylib.py \
            --ipa ipa_input/gtasa_original.ipa \
            --dylib build/libSAMP.dylib \
            --output gtasa_samp.ipa
          ls -lh gtasa_samp.ipa

      - name: Upload IPA com SAMP
        uses: actions/upload-artifact@v4
        with:
          name: gtasa-samp-ios
          path: gtasa_samp.ipa
          retention-days: 7

      - name: Upload relatorio de offsets
        uses: actions/upload-artifact@v4
        with:
          name: offsets-report
          path: |
            offsets_report.json
            src/ios_offsets.h
          retention-days: 30

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: libSAMP-dylib
          path: build/libSAMP.dylib
          retention-days: 7
